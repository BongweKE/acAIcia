<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b5d34" />
      <stop offset="100%" stop-color="#15aa5b" />
    </linearGradient>
    
    <!-- Leaf Gradient -->
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2f0e5" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Grouped Icon scaled and translated -->
  <g transform="translate(5, 5) scale(0.7)">
    <g fill="#2b5d34">
      <!-- Trunk and Branches -->
      <path d="M 47 80 
               C 47 70, 48 62, 46 56
               C 44 50, 36 46, 28 43
               L 30 40
               C 38 43, 45 47, 48 52
               C 49 48, 51 45, 54 42
               C 60 38, 68 37, 76 36
               L 77 39
               C 70 40, 62 41, 57 45
               C 54 49, 52 56, 52 80 Z" />
      <!-- Additional branches -->
      <path d="M 48 54 C 45 50, 41 47, 36 45 L 37 42 C 43 44, 47 48, 49 51 Z" />
      <path d="M 54 48 C 57 44, 63 41, 69 40 L 70 43 C 65 44, 59 47, 56 51 Z" />
      
      <!-- Foliage (Acacia Flat Canopy Layers) -->
      <ellipse cx="50" cy="30" rx="36" ry="7" />
      <ellipse cx="32" cy="38" rx="22" ry="6" />
      <ellipse cx="68" cy="38" rx="22" ry="6" />
      <ellipse cx="50" cy="24" rx="24" ry="5" />
      <ellipse cx="18" cy="41" rx="10" ry="4" />
      <ellipse cx="82" cy="41" rx="10" ry="4" />
    </g>
  </g>

  <!-- Text -->
  <text x="85" y="52" font-family="Outfit, sans-serif" font-size="38" font-weight="700" fill="#2b5d34" letter-spacing="-0.03em">
    ac<tspan fill="#15aa5b">AI</tspan>cia
  </text>
</svg>
