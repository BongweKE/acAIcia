<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b5d34" />
      <stop offset="100%" stop-color="#15aa5b" />
    </linearGradient>
    
    <!-- Leaf Gradient -->
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2f0e5" />
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Base Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bg-grad)" filter="url(#shadow)" />
  
  <!-- Subtle Inner Border -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2" />

  <!-- White Silhouette of Acacia Tree inside the circle -->
  <g fill="#ffffff">
    <!-- Trunk and Branches -->
    <path d="M 47 72 
             C 47 64, 48 57, 46 52
             C 44 47, 36 43, 28 40
             L 30 37
             C 38 40, 45 44, 48 49
             C 49 45, 51 42, 54 39
             C 60 35, 68 34, 76 33
             L 77 36
             C 70 37, 62 38, 57 42
             C 54 46, 52 52, 52 72 Z" />
    <!-- Additional branches -->
    <path d="M 48 50 C 45 46, 41 43, 36 41 L 37 38 C 43 40, 47 44, 49 47 Z" />
    <path d="M 54 45 C 57 41, 63 38, 69 37 L 70 40 C 65 41, 59 44, 56 48 Z" />
    
    <!-- Foliage -->
    <ellipse cx="50" cy="27" rx="32" ry="6" />
    <ellipse cx="34" cy="34" rx="20" ry="5" />
    <ellipse cx="66" cy="34" rx="20" ry="5" />
    <ellipse cx="50" cy="22" rx="22" ry="4" />
    <ellipse cx="20" cy="37" rx="8" ry="3" />
    <ellipse cx="80" cy="37" rx="8" ry="3" />
  </g>
</svg>
